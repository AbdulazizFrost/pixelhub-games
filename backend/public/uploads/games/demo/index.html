<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Dodger - Retro Playable Demo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0f14;
      color: #00f0ff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 10px 0;
      text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
      letter-spacing: 2px;
    }
    #gameContainer {
      position: relative;
      border: 3px solid #00f0ff;
      box-shadow: 0 0 20px #00f0ff;
      border-radius: 10px;
      overflow: hidden;
      background: #06080c;
    }
    canvas {
      display: block;
      background: linear-gradient(180deg, #0f111a 0%, #06080c 100%);
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(13, 15, 20, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .btn {
      padding: 12px 30px;
      background: transparent;
      border: 2px solid #00f0ff;
      color: #00f0ff;
      font-size: 18px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
      transition: all 0.3s ease;
      margin-top: 15px;
    }
    .btn:hover {
      background: #00f0ff;
      color: #0d0f14;
      box-shadow: 0 0 20px #00f0ff;
    }
    #scoreBoard {
      position: absolute;
      top: 15px;
      left: 20px;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      text-shadow: 0 0 5px #00f0ff;
    }
    #instructions {
      margin-top: 15px;
      font-size: 14px;
      color: #8f9cae;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>CYBER DODGER</h2>
  
  <div id="gameContainer">
    <div id="scoreBoard">SCORE: 0</div>
    <canvas id="gameCanvas" width="640" height="360"></canvas>
    <div id="overlay" onclick="startGame()">
      <div style="font-size: 24px; font-weight: bold; text-transform: uppercase;">WebGL Simulation Loaded</div>
      <div style="color: #ff007f; text-shadow: 0 0 10px #ff007f; margin: 5px 0;">HTML5 / CANVAS ENGINE ACTIVE</div>
      <button class="btn">Play Demo</button>
    </div>
  </div>

  <div id="instructions">
    Use Left / Right Arrows or A / D keys to move. Avoid neon red grids!
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreBoard = document.getElementById('scoreBoard');

    let gameActive = false;
    let score = 0;
    let player = { x: 300, y: 310, w: 40, h: 20, speed: 6 };
    let obstacles = [];
    let keys = {};
    let obstacleSpeed = 4;
    let obstacleSpawnInterval = 40;
    let frameCount = 0;

    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function startGame() {
      overlay.style.display = 'none';
      score = 0;
      player.x = 300;
      obstacles = [];
      obstacleSpeed = 4;
      obstacleSpawnInterval = 40;
      gameActive = true;
      animate();
    }

    function spawnObstacle() {
      const w = Math.random() * 60 + 20;
      const x = Math.random() * (canvas.width - w);
      obstacles.push({
        x: x,
        y: -20,
        w: w,
        h: 20,
        color: '#ff007f',
        glow: 'rgba(255, 0, 127, 0.8)'
      });
    }

    function checkCollision(r1, r2) {
      return r1.x < r2.x + r2.w &&
             r1.x + r1.w > r2.x &&
             r1.y < r2.y + r2.h &&
             r1.y + r1.h > r2.y;
    }

    function gameOver() {
      gameActive = false;
      overlay.style.display = 'flex';
      overlay.querySelector('div').innerText = 'Game Over';
      overlay.querySelector('.btn').innerText = 'Retry';
      
      // Post achievement triggers or scores to parent for immersive logging
      window.parent.postMessage({
        type: 'GAME_OVER',
        score: score
      }, '*');
    }

    function update() {
      // Player controls
      if (keys['arrowleft'] || keys['a']) {
        player.x -= player.speed;
      }
      if (keys['arrowright'] || keys['d']) {
        player.x += player.speed;
      }

      // Bound player
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

      // Obstacle management
      frameCount++;
      if (frameCount % obstacleSpawnInterval === 0) {
        spawnObstacle();
        if (score > 10 && score % 10 === 0) {
          obstacleSpeed += 0.5;
          if (obstacleSpawnInterval > 15) obstacleSpawnInterval -= 2;
        }
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += obstacleSpeed;

        // Collision Check
        if (checkCollision(player, obstacles[i])) {
          gameOver();
          return;
        }

        // Out of screen delete
        if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
          score++;
          scoreBoard.innerText = `SCORE: ${score}`;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid effect
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.08)';
      ctx.lineWidth = 1;
      const gridSize = 40;
      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw Player
      ctx.fillStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.roundRect(player.x, player.y, player.w, player.h, 5);
      ctx.fill();

      // Draw Obstacles
      for (const obs of obstacles) {
        ctx.fillStyle = obs.color;
        ctx.shadowColor = obs.glow;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 4);
        ctx.fill();
      }

      // Reset shadow blur
      ctx.shadowBlur = 0;
    }

    function animate() {
      if (!gameActive) return;
      update();
      draw();
      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
