version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: steam-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: steam_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: steam-express-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/steam_db?schema=public
      - JWT_SECRET=super-secret-neon-steam-jwt-key-2026
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - db
    volumes:
      - uploads-data:/app/public/uploads

  frontend:
    build: ./frontend
    container_name: steam-next-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
  uploads-data:
